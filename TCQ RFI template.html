ới hạn trong ranh đất quy hoạch; các hạng mục ngoài ranh và các nút giao đấu nối vào dự án không thuộc phạm vi gói thầu. Vui lòng xác nhận.",en:"The contractor understands that the scope is limited to within the planning boundary; works outside the boundary and connection junctions to the project are excluded. Please confirm.",type:"confirm"},{stt:8,vi:"Nhà thầu hiểu rằng công tác xin phép xây dựng (GPXD) và các thủ tục pháp lý (quy hoạch 1/500, đấu nối hạ tầng, giấy phép môi trường, giấy phép PCCC…) không thuộc phạm vi công việc của nhà thầu. Vui lòng xác nhận.",en:"The contractor understands that obtaining the construction permit and other legal approvals (1/500 planning, utility connection, environmental permit, fire-safety permit…) are excluded from the contractor's scope. Please confirm.",type:"confirm"},{stt:9,vi:"Vui lòng làm rõ công tác hoàn công, nghiệm thu với cơ quan nhà nước và nghiệm thu PCCC có thuộc phạm vi gói thầu hay không.",en:"Please clarify whether as-built completion and acceptance with State authorities and fire-safety (PCCC) acceptance fall within the package scope.",type:"question"},{stt:10,vi:"Vui lòng làm rõ các hạng mục đặc thù (cảnh quan/cây xanh, façade/mặt dựng, hệ lam nhôm, mái đón, vách compact WC, nội thất, hệ thống Solar, hệ thống trung thế & trạm biến áp…) có thuộc phạm vi gói thầu hay không.",en:"Please clarify whether specialized items (landscaping/greenery, façade, aluminium louvre system, entrance canopy, WC compact partitions, interior fit-out, solar system, MV system & substation…) fall within the package scope.",type:"question"},{stt:11,vi:"Vui lòng cung cấp thông tin liên hệ và đầu mối hiện trường để nhà thầu bố trí nhân sự khảo sát dự án.",en:"Please provide site contact information so the contractor can arrange personnel for a site survey.",type:"question"},{stt:12,vi:"Vui lòng cung cấp hồ sơ hoàn công phần ngầm hiện hữu của dự án (nếu có).",en:"Please provide the as-built records of the existing basement/sub-structure of the project (if any).",type:"question"},{stt:13,vi:"Vui lòng làm rõ cấp công trình, các tiêu chuẩn áp dụng và cung cấp thuyết minh tính toán thiết kế của dự án.",en:"Please clarify the project's construction grade, applicable standards, and provide the design calculation report.",type:"question"},{stt:14,vi:"Nhà thầu hiểu rằng việc nộp hồ sơ dự thầu là hoàn toàn tuân thủ các yêu cầu của HSMT; mọi đề xuất sai khác (nếu có) sẽ được trình bày trong danh sách sai lệch riêng để CĐT xem xét. Vui lòng xác nhận.",en:"The contractor understands the bid submission fully complies with the tender requirements; any deviation, if any, will be presented in a separate deviation list for the Employer's consideration. Please confirm.",type:"confirm"}]},{id:2,name:"CÂU HỎI VỀ CÔNG TÁC TẠM, ĐIỆN NƯỚC TẠM",items:[{stt:15,vi:"Vui lòng làm rõ vị trí và công suất các điểm đấu nối điện, nước tạm phục vụ thi công của dự án.",en:"Please clarify the location and capacity of the temporary power and water connection points for construction.",type:"question"},{stt:16,vi:"Vui lòng cho biết dự án đã có trạm biến áp hay chưa, nhà thầu có được phép sử dụng phục vụ thi công không và công suất là bao nhiêu; công tác hạ trạm có thuộc phạm vi nhà thầu không.",en:"Please advise whether the substation already exists, whether the contractor may use it for construction and at what capacity, and whether installing the substation is within the contractor's scope.",type:"question"},{stt:17,vi:"Vui lòng làm rõ công tác cung cấp & lắp đặt văn phòng tạm, tiện ích cho Chủ đầu tư/Tư vấn giám sát (CĐT/TVGS) có thuộc phạm vi nhà thầu không; nếu có, vui lòng cung cấp số lượng, diện tích và yêu cầu tiện ích cụ thể.",en:"Please clarify whether providing & installing temporary offices and facilities for the Employer/Consultant is within the contractor's scope; if so, please provide the required quantity, area and facility requirements.",type:"question"},{stt:18,vi:"Vui lòng làm rõ hạng mục hàng rào tạm, cổng tạm và biển tên dự án có thuộc phạm vi gói thầu không, và thực hiện cho lô đất nào (toàn khu hay riêng hạng mục).",en:"Please clarify whether temporary fencing, temporary gates and the project signboard are within the package scope, and for which area (whole site or specific item).",type:"question"},{stt:19,vi:"Nhà thầu hiểu rằng có trách nhiệm quản lý, duy trì, bảo trì hàng rào/cổng tạm hiện hữu; tuy nhiên công tác tháo dỡ, thanh lý hàng rào/cổng tạm không thuộc phạm vi gói thầu. Vui lòng xác nhận.",en:"The contractor understands it is responsible for managing and maintaining the existing temporary fence/gate, but dismantling and disposal of the temporary fence/gate are excluded from the package scope. Please confirm.",type:"confirm"},{stt:20,vi:"Vui lòng làm rõ vị trí được phép bố trí các công tác tạm của nhà thầu (văn phòng Ban chỉ huy, bãi gia công, kho bãi, lán trại công nhân…).",en:"Please clarify the locations where the contractor may place its temporary facilities (site management office, fabrication yard, storage, workers' camp…).",type:"question"},{stt:21,vi:"Vui lòng xác nhận nhà thầu được phép bố trí lán trại cho công nhân ở trong phạm vi công trường (trong trường hợp khu vực xung quanh cách xa khu dân cư).",en:"Please confirm the contractor may set up a workers' accommodation camp within the site (where the surroundings are far from residential areas).",type:"confirm"},{stt:22,vi:"Vui lòng làm rõ phạm vi công việc liên quan đến cẩu tháp/vận thăng (xin phép, hồ sơ thẩm tra, móng & kết cấu đỡ, vận hành thử, tháo dỡ, di dời) và trách nhiệm huy động cẩu tháp giữa các giai đoạn thi công.",en:"Please clarify the scope related to the tower crane/hoist (permitting, verification dossier, foundation & supporting structure, test run, dismantling, relocation) and the responsibility for crane mobilization across construction phases.",type:"question"},{stt:23,vi:"Nhà thầu hiểu rằng công tác đảm bảo an ninh toàn bộ công trường trong thời gian thi công thuộc trách nhiệm của nhà thầu chính, đồng thời phối hợp an ninh với các nhà thầu khác của CĐT. Vui lòng xác nhận.",en:"The contractor understands that site security for the entire site during construction is the main contractor's responsibility, including security coordination with the Employer's other contractors. Please confirm.",type:"confirm"},{stt:24,vi:"Nhà thầu hiểu rằng chi phí duy trì các tiện ích tạm trong suốt quá trình thi công (điện/nước, nhà vệ sinh tạm, vệ sinh văn phòng, chiếu sáng ban đêm khu vực cổng/hàng rào, internet/camera cho văn phòng CĐT/TVGS…) đã được bao gồm trong giá dự thầu. Vui lòng xác nhận.",en:"The contractor understands that the cost of maintaining temporary facilities throughout construction (power/water, temporary toilets, office cleaning, night lighting at gate/fence, internet/CCTV for the Employer/Consultant offices…) is included in the tender price. Please confirm.",type:"confirm"},{stt:25,vi:"Nhà thầu hiểu rằng chi phí cho mọi công trình tạm cần thiết để bảo vệ khu vực xung quanh và môi trường khỏi hư hại đã được bao gồm trong giá dự thầu. Vui lòng xác nhận.",en:"The contractor understands that the cost of any temporary works required to protect surrounding areas and the environment from damage is included in the tender price. Please confirm.",type:"confirm"}]},{id:3,name:"CÂU HỎI VỀ THỜI GIAN THI CÔNG",items:[{stt:26,vi:"Vui lòng cung cấp ngày khởi công dự kiến của dự án/gói thầu.",en:"Please provide the expected commencement date of the project/package.",type:"question"},{stt:27,vi:"Vui lòng cung cấp tổng thời gian thi công (tiến độ tổng thể) yêu cầu và tiến độ mong muốn của Chủ đầu tư.",en:"Please provide the required overall construction duration (master schedule) and the Employer's desired schedule.",type:"question"},{stt:28,vi:"Vui lòng làm rõ tổng thời gian thi công yêu cầu đã bao gồm ngày nghỉ lễ, Tết và thời gian ảnh hưởng do mưa bão hay chưa.",en:"Please clarify whether the required construction duration already includes public holidays, Tet, and time lost to rainy/storm weather.",type:"question"},{stt:29,vi:"Nhà thầu nhận thấy có sự không thống nhất về thời gian thi công giữa các tài liệu (Thư mời thầu, Hợp đồng, email…). Vui lòng làm rõ thời gian thi công chính thức là bao nhiêu ngày.",en:"The contractor notes inconsistencies in the construction duration among documents (invitation letter, contract, email…). Please clarify the official construction duration in number of days.",type:"question"},{stt:30,vi:"Vui lòng cung cấp các mốc bàn giao mặt bằng và cao độ bàn giao (theo hệ VN2000) cho nhà thầu vào thi công.",en:"Please provide the site hand-over milestones and the hand-over levels (per VN2000 datum) for the contractor to start work.",type:"question"},{stt:31,vi:"Vui lòng cho biết các gói thầu khác thi công đồng thời và tiến độ của chúng để nhà thầu có phương án phối hợp; cần xác định thời điểm các nhà thầu khác bắt đầu phối hợp.",en:"Please advise which other packages are executed concurrently and their schedules so the contractor can plan coordination, and define when the other contractors begin coordinating.",type:"question"},{stt:32,vi:"Vui lòng cho biết yêu cầu bàn giao theo giai đoạn hay bàn giao đồng thời, lộ trình bàn giao và thứ tự ưu tiên thi công giữa các phân khu.",en:"Please advise whether handover is phased or simultaneous, the handover roadmap and the construction priority order among zones.",type:"question"},{stt:33,vi:"Nhà thầu hiểu rằng sẽ bắt đầu công việc trong vòng bảy (7) ngày kể từ ngày nhận Thư chấp thuận của Chủ đầu tư. Vui lòng xác nhận.",en:"The contractor understands it shall commence the works within seven (7) days from receipt of the Employer's Letter of Acceptance. Please confirm.",type:"confirm"},{stt:34,vi:"Nhà thầu hiểu rằng Thời hạn Thông báo Sai sót (thời gian bảo hành) là __ tháng kể từ ngày phát hành Chứng chỉ Nghiệm thu (TOC). Vui lòng xác nhận.",en:"The contractor understands the Defects Notification Period (warranty period) is __ months from the date of issuing the Taking-Over Certificate (TOC). Please confirm.",type:"confirm"}]},{id:4,name:"CÂU HỎI LÀM RÕ KỸ THUẬT",items:[{stt:35,vi:"Vui lòng cung cấp chỉ dẫn kỹ thuật (Spec) và danh mục vật liệu yêu cầu cho từng hạng mục công việc.",en:"Please provide the technical specifications and required material list for each work item.",type:"question"},{stt:36,vi:"Nhà thầu nhận thấy có sự sai khác về chủng loại/thông số vật tư giữa BOQ, Bản vẽ, Danh mục vật tư và Chỉ dẫn kỹ thuật. Vui lòng làm rõ tài liệu nào được áp dụng.",en:"The contractor notes discrepancies in material type/specification among the BOQ, drawings, material list and specifications. Please clarify which document governs.",type:"question"},{stt:37,vi:"Nhà thầu không tìm thấy một số bản vẽ chi tiết/thuyết minh (ví dụ: chống thấm, chống mối, kết cấu, mặt cắt, chi tiết lắp đặt…). Vui lòng cung cấp bổ sung.",en:"The contractor cannot find certain detail drawings/explanations (e.g. waterproofing, anti-termite, structural, sections, installation details…). Please supplement them.",type:"question"},{stt:38,vi:"Nhà thầu được quyền đề xuất các thương hiệu/sản phẩm tương đương ngoài danh mục vật tư của HSMT, đệ trình để CĐT phê duyệt sau. Vui lòng xác nhận.",en:"The contractor may propose equivalent brands/products beyond the tender material list, to be submitted for the Employer's later approval. Please confirm.",type:"confirm"},{stt:39,vi:"Vui lòng làm rõ vật liệu, vị trí và chi tiết cấu tạo của công tác chống thấm (đáy & mặt đứng móng, vách & sàn hầm, sàn WC, sàn mái, các loại bể, mạch ngừng…).",en:"Please clarify the material, locations and construction details of the waterproofing works (footing base & sides, basement walls & slabs, WC floors, roof slabs, tanks, construction joints…).",type:"question"},{stt:40,vi:"Vui lòng làm rõ yêu cầu và phạm vi áp dụng công tác chống mối cho dự án (vị trí, vật liệu/hóa chất, tỷ lệ pha, bản vẽ chi tiết).",en:"Please clarify the requirement and scope of anti-termite treatment for the project (locations, material/chemical, mixing ratio, detail drawings).",type:"question"},{stt:41,vi:"Vui lòng làm rõ chủng loại gạch xây (nung hay không nung/AAC), chiều dày tường, loại vữa trát (vữa chuyên dụng hay vữa xi măng trộn tại công trường) và mác vữa áp dụng.",en:"Please clarify the masonry type (fired or non-fired/AAC brick), wall thickness, plaster mortar type (proprietary mortar or site-mixed cement mortar) and the mortar grade applied.",type:"question"},{stt:42,vi:"Vui lòng làm rõ chủng loại, độ dày, tiêu chuẩn sơn và yêu cầu chống cháy của hệ cửa và nhôm kính (cửa đi, cửa sổ, vách kính, louver, hệ nhôm…); làm rõ trường hợp louver nhôm/kính được yêu cầu chống cháy.",en:"Please clarify the type, thickness, paint standard and fire-rating requirements of the door and aluminium-glazing systems (doors, windows, glass partitions, louvres, aluminium systems…); clarify cases where aluminium louvres/glass are required to be fire-rated.",type:"question"},{stt:43,vi:"Vui lòng làm rõ chủng loại và thông số kỹ thuật của máy biến áp (loại khô hay dầu, dây đồng hay nhôm) và xác nhận thông tin khi các bản vẽ thể hiện khác nhau.",en:"Please clarify the type and specification of the transformer (dry or oil type, copper or aluminium winding) and confirm when drawings differ.",type:"question"},{stt:44,vi:"Vui lòng làm rõ thông số máy phát điện (bồn dầu theo máy hay bồn dầu rời, thời gian vận hành khi mất điện, độ ồn/vỏ cách âm, bộ lọc khói…).",en:"Please clarify the generator specification (built-in or separate daily fuel tank, autonomy on power failure, noise level/soundproof enclosure, smoke filter…).",type:"question"},{stt:45,vi:"Vui lòng làm rõ chủng loại và cỡ cáp (kể cả cáp chống cháy cho đèn thoát hiểm/sự cố) khi có sai khác giữa các bản vẽ và sơ đồ nguyên lý tủ phân phối; vui lòng cung cấp sơ đồ nguyên lý (single line) còn thiếu.",en:"Please clarify cable type and size (including fire-rated cable for exit/emergency lighting) where drawings and distribution-board single-line diagrams differ; please provide any missing single-line diagrams.",type:"question"},{stt:46,vi:"Vui lòng làm rõ tiêu chuẩn áp dụng cho hệ thống PCCC (TCVN/NFPA), cấu hình đầu phun sprinkler trong/ngoài giá đỡ theo chiều cao hàng hóa, bậc chịu lửa và phạm vi đường ống chữa cháy ngoài nhà.",en:"Please clarify the applicable fire-fighting standards (TCVN/NFPA), the in-rack/under-roof sprinkler configuration per goods height, the fire-resistance grade and the scope of external fire-fighting piping.",type:"question"},{stt:47,vi:"Vui lòng làm rõ phạm vi hệ thống cấp thoát nước (đường ống cấp/thoát, hố ga, ống thông hơi, phễu thu nước mưa, bể tự hoại composite…) và xác nhận hệ thống thoát nước mưa/ngoài nhà có thuộc phạm vi gói cơ điện hay không.",en:"Please clarify the scope of the water supply & drainage system (supply/drainage pipes, manholes, vent pipes, rainwater funnels, composite septic tank…) and confirm whether the storm/external drainage is within the M&E scope.",type:"question"},{stt:48,vi:"Vui lòng làm rõ chủng loại và độ dày tấm lợp/panel mái và tường (tôn lớp trên/dưới sau sơn, panel EPS, máng nước inox…) khi BOQ, bản vẽ và sản phẩm trên thị trường có sai khác.",en:"Please clarify the type and thickness of roof/wall panels (top/bottom corrugated sheet after painting, EPS panel, stainless gutter…) where the BOQ, drawings and market products differ.",type:"question"},{stt:49,vi:"Vui lòng làm rõ các chi tiết cấu tạo kết cấu còn thiếu/sai khác: chống thấm và bố trí thép móng, khoảng rải thép đai dầm, cóc kê thép sàn, mối nối thép, cắt đầu cọc, thép chờ & coupler tại tường vây.",en:"Please clarify missing/inconsistent structural details: footing waterproofing & reinforcement, beam stirrup spacing, slab rebar spacers, rebar laps, pile head cutting, starter bars & couplers at the diaphragm wall.",type:"question"},{stt:50,vi:"Vui lòng làm rõ phạm vi và trách nhiệm xử lý giao diện với gói tường vây/cọc khoan nhồi (thép chờ, coupler, dầm mũ/capping beam, làm phẳng bề mặt tường vây trước khi tô trát) và xử lý phát sinh khi coupler đặt sai cao độ.",en:"Please clarify the scope and responsibility at the interface with the diaphragm-wall/bored-pile package (starter bars, couplers, capping beam, surface levelling of the diaphragm wall before plastering) and the treatment when couplers are set at the wrong level.",type:"question"},{stt:51,vi:"Đối với thi công phần ngầm/hố đào sâu, vui lòng làm rõ yêu cầu khống chế hạ mực nước ngầm, kiểm tra chuyển vị tường vây, quan trắc lún/nghiêng công trình lân cận và biện pháp dự phòng; xác nhận đề cương quan trắc áp dụng.",en:"For sub-structure/deep-excavation works, please clarify the dewatering control requirements, diaphragm-wall displacement checks, settlement/tilt monitoring of adjacent structures and contingency measures; confirm the applicable monitoring brief.",type:"question"},{stt:52,vi:"Vui lòng làm rõ chủng loại, chi tiết hoàn thiện (gạch lát/ốp, sơn, trần, len chân tường) và chiều cao trát/ốp tại các khu vực có đóng trần khi BOQ và bản vẽ hoàn thiện sai khác.",en:"Please clarify the type, finishing details (floor/wall tiles, paint, ceiling, skirting) and the plaster/tiling height at areas with suspended ceilings where the BOQ and finishing drawings differ.",type:"question"},{stt:53,vi:"Vui lòng làm rõ thông số kỹ thuật và phạm vi hạ tầng kỹ thuật ngoài nhà (đường giao thông, nắp gang/composite theo tải trọng, mương thoát nước, hệ tưới cây, chiếu sáng cảnh quan).",en:"Please clarify the specifications and scope of external infrastructure (roads, ductile-iron/composite covers per load rating, drainage channels, irrigation, landscape lighting).",type:"question"},{stt:54,vi:"Đối với hạng mục MEPF, nhà thầu xác nhận đơn giá đã bao gồm công tác đặt ống chờ âm sàn, sleeve xuyên sàn/vách, cắt đục, fill chống cháy lan và công tác chạy thử & nghiệm thu (T&C). Vui lòng xác nhận.",en:"For MEPF works, the contractor confirms unit rates include floor cast-in conduits, slab/wall sleeves, chasing, fire-stopping and Testing & Commissioning (T&C). Please confirm.",type:"confirm"}]},{id:5,name:"CÂU HỎI LÀM RÕ ĐIỀU KHOẢN THƯƠNG MẠI",items:[{stt:55,vi:"Vui lòng làm rõ loại hình hợp đồng áp dụng cho dự án (trọn gói giá cố định, hay đơn giá cố định khối lượng tính lại theo thực tế) và cung cấp hợp đồng mẫu.",en:"Please clarify the contract type applicable to the project (fixed lump-sum, or fixed unit-price with remeasurement) and provide the sample contract.",type:"question"},{stt:56,vi:"Nhà thầu hiểu rằng BOQ chỉ mang tính tham khảo; mọi công việc cần thiết để hoàn thành công trình theo bản vẽ, chỉ dẫn kỹ thuật và điều kiện hợp đồng được xem là đã bao gồm trong giá dự thầu kể cả khi không nêu đầy đủ trong BOQ; các mục để trống trong BOQ được hiểu là đã bao gồm trong các đơn giá khác. Vui lòng xác nhận.",en:"The contractor understands the BOQ is indicative only; all works necessary to complete the project per the drawings, specifications and contract conditions are deemed included in the tender price even if not fully stated in the BOQ; blank items in the BOQ are deemed included in other rates. Please confirm.",type:"confirm"},{stt:57,vi:"Vui lòng làm rõ trường hợp hợp đồng có giới hạn phát sinh khối lượng (ví dụ không quá 5%): mức này áp dụng cho tổng giá trị hợp đồng hay cho từng đầu mục công việc.",en:"Please clarify, where the contract limits quantity variation (e.g. not exceeding 5%), whether this applies to the total contract value or to each individual work item.",type:"question"},{stt:58,vi:"Nhà thầu hiểu rằng Bảo lãnh Thực hiện Hợp đồng là __% Giá trị Hợp đồng được Chấp thuận, phát hành bởi ngân hàng được phê duyệt và có hiệu lực đến khi nghiệm thu hoàn thành/chuyển bảo hành. Vui lòng xác nhận giá trị trước hay sau thuế.",en:"The contractor understands the Performance Security is __% of the Accepted Contract Amount, issued by an approved bank, valid until completion/warranty transfer. Please confirm whether the value is before or after tax.",type:"confirm"},{stt:59,vi:"Nhà thầu hiểu rằng Bảo lãnh Tạm ứng và mức Tạm ứng là __% Giá trị Hợp đồng được Chấp thuận (chưa gồm VAT), được hoàn trả dần từ lần thanh toán đầu tiên và hoàn trả đủ khi đạt __% khối lượng hợp đồng. Vui lòng xác nhận.",en:"The contractor understands the Advance Payment Guarantee and advance amount are __% of the Accepted Contract Amount (excl. VAT), recovered progressively from the first payment and fully recovered upon reaching __% of contract value. Please confirm.",type:"confirm"},{stt:60,vi:"Nhà thầu hiểu rằng tỷ lệ Khoản tiền Giữ lại là __% giá trị mỗi đợt thanh toán, giới hạn __% Giá Hợp đồng sau cùng (chưa gồm VAT), bằng tiền mặt và không áp dụng bảo lãnh ngân hàng. Vui lòng xác nhận.",en:"The contractor understands the Retention is __% of each payment, capped at __% of the final Contract Price (excl. VAT), in cash with no bank guarantee applied. Please confirm.",type:"confirm"},{stt:61,vi:"Nhà thầu hiểu rõ Thời hạn thanh toán (tạm ứng, thanh toán tạm hàng kỳ, quyết toán) và thời hạn thanh toán Khoản tiền Giữ lại. Vui lòng xác nhận và cung cấp các mốc thời gian cụ thể.",en:"The contractor understands the payment terms (advance, periodic interim payment, final settlement) and the timing for releasing retention. Please confirm and provide the specific timelines.",type:"confirm"},{stt:62,vi:"Nhà thầu hiểu rằng Bồi thường thiệt hại do chậm trễ (DLD) là __% Giá trị Hợp đồng cho mỗi ngày chậm, với mức tối đa __% Giá trị Hợp đồng. Vui lòng xác nhận.",en:"The contractor understands the Delay Liquidated Damages are __% of the Contract Value per day of delay, capped at __% of the Contract Value. Please confirm.",type:"confirm"},{stt:63,vi:"Vui lòng làm rõ các loại bảo hiểm Chủ đầu tư yêu cầu nhà thầu thực hiện (trách nhiệm dân sự bên thứ ba, người lao động, máy móc thiết bị, bảo hiểm mọi rủi ro xây dựng CAR…) và bên nào chịu trách nhiệm cho từng loại.",en:"Please clarify the insurances the Employer requires the contractor to take out (third-party liability, workers, plant & equipment, Contractor's All Risks – CAR…) and which party is responsible for each.",type:"question"},{stt:64,vi:"Vui lòng làm rõ thời gian bảo hành, % giá trị bảo hành và hình thức giữ bảo hành (tiền mặt hay bảo lãnh ngân hàng) áp dụng cho dự án.",en:"Please clarify the warranty period, the warranty percentage and the form of warranty security (cash or bank guarantee) applicable to the project.",type:"question"},{stt:65,vi:"Vui lòng cung cấp danh sách ngân hàng được Chủ đầu tư chấp thuận để phát hành bảo lãnh dự thầu, bảo lãnh thực hiện và bảo lãnh tạm ứng; làm rõ giá trị bảo lãnh dự thầu yêu cầu.",en:"Please provide the list of banks approved by the Employer for issuing the bid, performance and advance-payment guarantees; clarify the required bid security value.",type:"question"},{stt:66,vi:"Vui lòng làm rõ thuế suất VAT áp dụng và xác nhận Giá trị Hợp đồng được chấp thuận là giá trị trước VAT, VAT được cộng thêm vào mỗi đợt thanh toán theo luật hiện hành.",en:"Please clarify the applicable VAT rate and confirm the Accepted Contract Amount is the pre-VAT value, with VAT added to each payment per prevailing law.",type:"question"},{stt:67,vi:"Vui lòng làm rõ chính sách trượt giá vật tư của dự án (ngưỡng biến động được xét, công thức tính, mức trượt giá tối đa dự trù) hay xác nhận giá hợp đồng không điều chỉnh theo biến động chi phí.",en:"Please clarify the project's price-escalation policy (the variation threshold considered, the calculation formula, the maximum provisional escalation) or confirm the contract price is not adjusted for cost fluctuations.",type:"question"},{stt:68,vi:"Nhà thầu hiểu rằng giá dự thầu đã bao gồm toàn bộ chi phí thuộc 'Điều kiện chung & Công tác chuẩn bị ban đầu' (Prelim), điện/nước, dọn dẹp/bảo vệ trước nghiệm thu, chi phí phối hợp với nhà thầu khác, làm việc ngày lễ/Tết/mùa mưa, và tiếp quản hiện trạng mặt bằng. Vui lòng xác nhận.",en:"The contractor understands the tender price includes all 'General Conditions & Preliminaries' costs, water/power, cleaning/protection before acceptance, costs of coordination with other contractors, work on holidays/Tet/rainy season, and taking over the existing site condition. Please confirm.",type:"confirm"},{stt:69,vi:"Vui lòng làm rõ chi phí làm việc ngoài giờ/tăng ca cho nhân sự CĐT, TVGS tại công trường có thuộc trách nhiệm nhà thầu không; nếu có, vui lòng cung cấp số lượng nhân sự và đơn giá để nhà thầu dự trù.",en:"Please clarify whether overtime costs for the Employer/Consultant site staff are the contractor's responsibility; if so, please provide headcount and unit rates for the contractor to allow for.",type:"question"},{stt:70,vi:"Nhà thầu hiểu rằng Chủ đầu tư/Tư vấn có quyền điều chỉnh các đơn giá thấp/cao bất hợp lý về mức hợp lý mà không thay đổi tổng giá trị trao thầu, và áp dụng đơn giá thấp nhất cho cùng hạng mục khi đánh giá phát sinh. Vui lòng xác nhận.",en:"The contractor understands the Employer/Consultant may adjust unreasonably low/high unit rates to a reasonable level without changing the total awarded value, and apply the lowest rate for identical items when assessing variations. Please confirm.",type:"confirm"},{stt:71,vi:"Vui lòng làm rõ phương pháp/quy ước đo bóc và thanh toán khối lượng (ví dụ: hệ số không gian làm việc & taluy cho công tác đào, đầu móc & thép kê cho công tác cốt thép, chiều dài cọc thanh toán từ cao độ cắt cọc đến mũi cọc).",en:"Please clarify the quantity measurement & payment convention (e.g. working-space & batter factor for excavation, hooks & support bars for reinforcement, paid pile length from cut-off level to actual toe level).",type:"question"},{stt:72,vi:"Trong trường hợp CĐT cung cấp vật tư chính (thép, bê tông…), vui lòng xác nhận trách nhiệm và chi phí kiểm tra/nghiệm thu đầu vào, cũng như chi phí nhân công chờ/phát sinh khi nhà cung cấp của CĐT không cung cấp kịp.",en:"Where the Employer supplies key materials (steel, concrete…), please confirm responsibility and cost for incoming inspection/acceptance, and the standby/incidental labour cost if the Employer's supplier fails to deliver on time.",type:"question"}]},{id:6,name:"CÂU HỎI KHÁC",items:[{stt:73,vi:"Vui lòng làm rõ thời hạn nộp hồ sơ dự thầu và thành phần hồ sơ dự thầu (hồ sơ kỹ thuật, hồ sơ thương mại, BOQ có/không có đơn giá theo từng lần nộp).",en:"Please clarify the bid submission deadline and the composition of the bid (technical dossier, commercial dossier, BOQ with/without rates for each submission).",type:"question"},{stt:74,vi:"Nhà thầu nhận thấy có sự không thống nhất về thời hạn nộp thầu giữa các tài liệu (HSMT và email). Vui lòng làm rõ thời hạn nộp thầu chính thức.",en:"The contractor notes inconsistencies in the bid submission deadline among documents (tender documents and email). Please clarify the official submission deadline.",type:"question"},{stt:75,vi:"Để đảm bảo chất lượng hồ sơ, nhà thầu đề xuất gia hạn thời gian nộp thầu. Vui lòng xác nhận.",en:"To ensure the quality of the bid, the contractor proposes extending the submission deadline. Please confirm.",type:"confirm"},{stt:76,vi:"Vui lòng cho biết thời hạn cuối cùng tiếp nhận câu hỏi làm rõ Hồ sơ mời thầu.",en:"Please advise the final deadline for receiving tender clarification questions.",type:"question"},{stt:77,vi:"Bảo lãnh dự thầu sắp/đã hết hạn; nhà thầu xác nhận sẽ gia hạn Thư bảo lãnh dự thầu trong lần đệ trình tới. Vui lòng xác nhận.",en:"The bid security is nearing/has expired; the contractor confirms it will extend the bid security in the next submission. Please confirm.",type:"confirm"},{stt:78,vi:"Nhà thầu đề nghị Chủ đầu tư xem xét mức giảm giá sau cùng của gói thầu (nếu có) để Chủ đầu tư xem xét.",en:"The contractor requests the Employer to consider the final discount for the package (if any) for the Employer's review.",type:"question"}]}],c={1:{color:"#C9821F",soft:"#FCEFDD",en:"General"},2:{color:"#1F6FA8",soft:"#E0EEF8",en:"Temporary works / Utilities"},3:{color:"#4C7A2E",soft:"#E7F1DC",
